<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Trade</title>

    <style>
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 24px;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
        }

        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
        }

        h1 {
            margin-top: 0;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 16px;
            color: #93c5fd;
        }

        .field {
            margin-bottom: 16px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-size: 14px;
        }

        input,
        select {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #0f172a;
            color: #e2e8f0;
        }

        .button {
            background: #38bdf8;
            color: #082f49;
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: bold;
        }

        #suggestions {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 8px;
            overflow: hidden;
            z-index: 10;
        }

        .suggestion {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #334155;
        }

        .suggestion:last-child {
            border-bottom: none;
        }

        .suggestion:hover {
            background: #1e293b;
        }

        #warning {
            margin-top: 8px;
            color: #f87171;
            min-height: 20px;
            font-weight: bold;
        }

        .helper {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <a class="back-link" href="{{ url_for('index') }}">← Back to dashboard</a>

    <div class="card">
        <h1>Add Trade</h1>

        <form method="post">
            <!--
                NEW FIELD:
                This dropdown lets the user explicitly choose whether the trade
                is a BUY or a SELL.

                Why this matters:
                - BUY  = user gains the item, loses seeds
                - SELL = user loses the item, gains seeds

                The backend uses this value to automatically flip the signs for
                quantity and seeds so the rest of the app can keep using a single,
                consistent trade model.
            -->
            <div class="field">
                <label for="trade_type">Trade Type</label>
                <select id="trade_type" name="trade_type" required>
                    <option value="buy">Buy (Spend Seeds)</option>
                    <option value="sell">Sell (Gain Seeds)</option>
                </select>
            </div>

            <div class="field">
                <label for="item">Item</label>
                <input id="item" name="item" type="text" placeholder="Start typing an item name..." autocomplete="off" required>
                <div id="suggestions"></div>
            </div>

            <div class="field">
                <label for="quantity">Quantity</label>
                <input id="quantity" name="quantity" type="number" min="1" step="1" required>
            </div>

            <div class="field">
                <label for="price">Your Price</label>
                <input id="price" name="price" type="number" min="0" step="0.01" required>
            </div>

            <div class="field">
                <label for="avg_price">Avg 24h Price</label>
                <input id="avg_price" name="avg_price" type="number" min="0" step="0.01" required>
            </div>

            <!--
                Label changed from "Seeds Received" to just "Seeds" because:
                - on SELL you receive seeds
                - on BUY you spend seeds

                The number the user types stays positive in the form.
                The backend decides whether it becomes positive or negative.
            -->
            <div class="field">
                <label for="seeds">Seeds</label>
                <input id="seeds" name="seeds" type="number" step="1" required>
                <div id="warning"></div>
                <div class="helper">
                    A warning appears when the trade is below 50% of expected avg value.
                </div>
            </div>

            <button class="button" type="submit">Save Trade</button>
        </form>
    </div>
</div>

<script>
    /*
        Autocomplete now uses backend API instead of preloaded data.
    */

    const itemInput = document.getElementById("item");
    const suggestionsBox = document.getElementById("suggestions");

    const quantityInput = document.getElementById("quantity");
    const avgPriceInput = document.getElementById("avg_price");
    const seedsInput = document.getElementById("seeds");
    const warningBox = document.getElementById("warning");

    /*
        NEW:
        We read the trade type so the warning logic can behave differently
        for buys vs sells.

        Existing warning rule in your project:
        - warn when the trade is below 50% of expected avg value

        But that only really makes sense for SELLS, because "bad trade"
        currently means you got too few seeds back.

        For BUYS:
        - you are spending seeds, not receiving them
        - the old warning logic would incorrectly flag almost every buy

        So below, the warning is only shown for SELL trades.
    */
    const tradeTypeInput = document.getElementById("trade_type");

    let autocompleteAbortController = null;

    async function fetchSuggestions(query) {
        if (autocompleteAbortController) {
            autocompleteAbortController.abort();
        }

        autocompleteAbortController = new AbortController();

        const response = await fetch(`/api/items?q=${encodeURIComponent(query)}`, {
            signal: autocompleteAbortController.signal
        });

        if (!response.ok) {
            return [];
        }

        return await response.json();
    }

    function clearSuggestions() {
        suggestionsBox.innerHTML = "";
    }

    function renderSuggestions(items) {
        clearSuggestions();

        if (!items.length) return;

        for (const item of items) {
            const suggestion = document.createElement("div");
            suggestion.className = "suggestion";
            suggestion.textContent = item.name;

            suggestion.addEventListener("click", () => {
                itemInput.value = item.name;
                clearSuggestions();
            });

            suggestionsBox.appendChild(suggestion);
        }
    }

    let debounceTimeout = null;

    itemInput.addEventListener("input", () => {
        clearTimeout(debounceTimeout);

        debounceTimeout = setTimeout(async () => {
            const query = itemInput.value.trim();

            if (!query) {
                clearSuggestions();
                return;
            }

            try {
                const items = await fetchSuggestions(query);
                renderSuggestions(items);
            } catch (error) {
                if (error.name !== "AbortError") {
                    clearSuggestions();
                }
            }
        }, 200);
    });

    document.addEventListener("click", (event) => {
        if (event.target !== itemInput && !suggestionsBox.contains(event.target)) {
            clearSuggestions();
        }
    });

    function updateBadTradeWarning() {
        const quantity = Number(quantityInput.value || 0);
        const avgPrice = Number(avgPriceInput.value || 0);
        const seeds = Number(seedsInput.value || 0);
        const tradeType = tradeTypeInput.value;

        const expected = avgPrice * quantity;

        /*
            IMPORTANT:
            Only show the "bad trade" warning for SELL trades.

            Reason:
            - SELL: seeds entered = seeds you receive, so comparing received
              seeds against expected value makes sense.
            - BUY: seeds entered = seeds you spend, so the old comparison would
              be backwards and misleading.
        */
        if (
            tradeType === "sell" &&
            quantity > 0 &&
            avgPrice > 0 &&
            seeds < expected * 0.5
        ) {
            warningBox.textContent = "⚠ BAD TRADE";
        } else {
            warningBox.textContent = "";
        }
    }

    quantityInput.addEventListener("input", updateBadTradeWarning);
    avgPriceInput.addEventListener("input", updateBadTradeWarning);
    seedsInput.addEventListener("input", updateBadTradeWarning);
    tradeTypeInput.addEventListener("change", updateBadTradeWarning);
</script>
</body>
</html>
