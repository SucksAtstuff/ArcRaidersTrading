<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Trade</title>

    <style>
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 24px;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
        }

        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 16px;
            color: #93c5fd;
            text-decoration: none;
        }

        .field {
            margin-bottom: 16px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-size: 14px;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #0f172a;
            color: #e2e8f0;
        }

        .button {
            background: #38bdf8;
            color: #082f49;
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: bold;
        }

        #suggestions {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 8px;
            overflow: hidden;
            z-index: 10;
        }

        .suggestion {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #334155;
        }

        .suggestion:last-child {
            border-bottom: none;
        }

        .suggestion:hover {
            background: #1e293b;
        }

        #warning {
            margin-top: 8px;
            color: #f87171;
            min-height: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <a class="back-link" href="{{ url_for('index') }}">← Back to dashboard</a>

    <div class="card">
        <h1>Edit Trade</h1>

        <form method="post">
            <div class="field">
                <label for="item">Item</label>
                <input id="item" name="item" type="text" value="{{ trade.item }}" autocomplete="off" required>
                <div id="suggestions"></div>
            </div>

            <div class="field">
                <label for="quantity">Quantity</label>
                <input id="quantity" name="quantity" type="number" min="1" step="1" value="{{ trade.quantity }}" required>
            </div>

            <div class="field">
                <label for="price">Your Price</label>
                <input id="price" name="price" type="number" min="0" step="0.01" value="{{ trade.price }}" required>
            </div>

            <div class="field">
                <label for="avg_price">Avg 24h Price</label>
                <input id="avg_price" name="avg_price" type="number" min="0" step="0.01" value="{{ trade.avg_price }}" required>
            </div>

            <div class="field">
                <label for="seeds">Seeds Received</label>
                <input id="seeds" name="seeds" type="number" step="1" value="{{ trade.seeds }}" required>
                <div id="warning"></div>
            </div>

            <button class="button" type="submit">Save Changes</button>
        </form>
    </div>
</div>

<script>
    const itemInput = document.getElementById("item");
    const suggestionsBox = document.getElementById("suggestions");

    const quantityInput = document.getElementById("quantity");
    const avgPriceInput = document.getElementById("avg_price");
    const seedsInput = document.getElementById("seeds");
    const warningBox = document.getElementById("warning");

    let autocompleteAbortController = null;

    async function fetchSuggestions(query) {
        if (autocompleteAbortController) {
            autocompleteAbortController.abort();
        }

        autocompleteAbortController = new AbortController();

        const response = await fetch(`/api/items?q=${encodeURIComponent(query)}`, {
            signal: autocompleteAbortController.signal
        });

        if (!response.ok) {
            return [];
        }

        return await response.json();
    }

    function clearSuggestions() {
        suggestionsBox.innerHTML = "";
    }

    function renderSuggestions(items) {
        clearSuggestions();

        for (const item of items) {
            const suggestion = document.createElement("div");
            suggestion.className = "suggestion";
            suggestion.textContent = item.name;

            suggestion.addEventListener("click", () => {
                itemInput.value = item.name;
                clearSuggestions();
            });

            suggestionsBox.appendChild(suggestion);
        }
    }

    itemInput.addEventListener("input", async () => {
        const query = itemInput.value.trim();

        if (!query) {
            clearSuggestions();
            return;
        }

        try {
            const items = await fetchSuggestions(query);
            renderSuggestions(items);
        } catch (error) {
            if (error.name !== "AbortError") {
                clearSuggestions();
            }
        }
    });

    document.addEventListener("click", (event) => {
        if (event.target !== itemInput && !suggestionsBox.contains(event.target)) {
            clearSuggestions();
        }
    });

    function updateBadTradeWarning() {
        const quantity = Number(quantityInput.value || 0);
        const avgPrice = Number(avgPriceInput.value || 0);
        const seeds = Number(seedsInput.value || 0);

        const expected = avgPrice * quantity;

        if (quantity > 0 && avgPrice > 0 && seeds < expected * 0.5) {
            warningBox.textContent = "⚠ BAD TRADE";
        } else {
            warningBox.textContent = "";
        }
    }

    quantityInput.addEventListener("input", updateBadTradeWarning);
    avgPriceInput.addEventListener("input", updateBadTradeWarning);
    seedsInput.addEventListener("input", updateBadTradeWarning);

    updateBadTradeWarning();
</script>
</body>
</html>
